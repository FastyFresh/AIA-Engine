<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbright Content Manager</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #fff;
            padding: 20px;
        }
        .header { 
            text-align: center; 
            padding: 20px;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .header h1 { 
            font-size: 28px; 
            background: linear-gradient(90deg, #ff6b9d, #c44569);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: #888; margin-top: 5px; }
        .stats { 
            display: flex; 
            gap: 30px; 
            justify-content: center; 
            margin-top: 15px;
        }
        .stat { 
            background: rgba(255,255,255,0.1); 
            padding: 10px 20px; 
            border-radius: 20px;
            font-size: 14px;
        }
        .batch-section { 
            margin-bottom: 30px; 
            background: #1a1a2e;
            border-radius: 12px;
            padding: 20px;
        }
        .batch-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #333;
        }
        .batch-title { 
            color: #ff6b9d; 
            font-size: 18px;
            font-weight: 600;
        }
        .batch-date { color: #666; font-size: 12px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px;
        }
        .image-card { 
            background: #0d1117;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .image-card:hover { 
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255,107,157,0.2);
        }
        .image-card img { 
            width: 100%; 
            height: 250px;
            object-fit: cover;
            display: block;
        }
        .image-info { 
            padding: 10px; 
            font-size: 11px;
            color: #888;
        }
        .download-btn {
            display: block;
            width: 100%;
            padding: 8px;
            background: #ff6b9d;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: 12px;
            border: none;
            cursor: pointer;
        }
        .download-btn:hover { background: #c44569; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal img { max-width: 90vw; max-height: 90vh; }
        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: #fff;
            font-size: 30px;
            cursor: pointer;
        }
        .actions {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }
        .action-btn {
            padding: 15px 25px;
            background: linear-gradient(135deg, #ff6b9d, #c44569);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ Starbright Content Manager</h1>
        <p>All generated images in one place</p>
        <div class="stats">
            <div class="stat">{{total_images}} Images</div>
            <div class="stat">{{today_images}} Today</div>
            <div class="stat">{{batches}} Batches</div>
        </div>
    </div>

    {{batch_sections}}

    <div class="actions">
        <a href="/download-all" class="action-btn">⬇ Download All</a>
        <a href="/gallery" class="action-btn">🖼 Gallery View</a>
    </div>

    <div class="modal" id="modal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <img id="modalImg" src="" alt="Full size">
    </div>

    <script>
        function openModal(url) {
            document.getElementById('modal').classList.add('active');
            document.getElementById('modalImg').src = url;
        }
        function closeModal() {
            document.getElementById('modal').classList.remove('active');
        }
        document.addEventListener('keydown', e => {
            if(e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
